name: 🔄 Hachimi Auto Checkin

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发
  schedule:
    # 2次签到，确保不漏签
    - cron: "32 1 * * *"
    - cron: "55 14 * * *"

# 权限配置：允许提交和推送更改
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROJECT_DIR: hachimi
      SCRIPT_NAME: hachimi_checkin.py
      SCRIPT_DESC: Hachimi 签到脚本
    
    steps:
      # 步骤 1: 检出公开仓库
      - name: 📥 检出公开仓库
        uses: actions/checkout@v4
      
      # 步骤 1.5: 创建输出目录
      - name: 📁 创建输出目录
        run: mkdir -p ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
        working-directory: .
      
      # 步骤 2: 检出私有仓库 40行改成私库自己的名字
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: zam1238/hachimi
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      # 步骤 3: 设置 Python 环境
      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 步骤 4: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-noto-cjk

      # 步骤 5: 安装 Python 依赖
      - name: 📚 安装 Python 依赖
        run: |
          pip install requests seleniumbase pyvirtualdisplay
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 未找到 requirements.txt，跳过依赖安装"
          fi
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 5.5: 安装 Hysteria2（如果需要代理）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ secrets.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      # 步骤 6: 添加随机延迟
      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      # 步骤 7: 执行脚本
      - name: 🚀 执行 ${{ env.SCRIPT_DESC }}
        env:
          HACHIMI_BATCH: ${{ secrets.HACHIMI_BATCH }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
        run: xvfb-run -a python ${{ env.SCRIPT_NAME }}
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 8: 提交时间文件到公开库
      - name: ⏱️ 提交时间文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p hachimi && echo "$(date +'%Y-%m-%d %H:%M:%S')" > hachimi/time.txt
          git add hachimi/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 hachimi 时间文件: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi
